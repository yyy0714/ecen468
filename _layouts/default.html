<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row min-vh-100">
        <nav class="col-md-3 col-lg-2 p-3 bg-body-tertiary">
          <a href="{{ '/' | relative_url }}" class="d-block fs-4 mb-3 link-body-emphasis text-decoration-none">{{ site.title }}</a>
          <ul class="nav nav-pills flex-column">
            <li class="nav-item">
              <a {% if page.url == '/' %}class="nav-link active" aria-current="page"{% else %}class="nav-link"{% endif %} href="{{ '/' | relative_url }}">Labs</a>
            </li>
            <li class="nav-item">
              <a {% if page.url == '/policies/' %}class="nav-link active" aria-current="page"{% else %}class="nav-link"{% endif %} href="{{ '/policies/' | relative_url }}">Policies</a>
            </li>
            <li class="nav-item">
              <a {% if page.url == '/staff/' %}class="nav-link active" aria-current="page"{% else %}class="nav-link"{% endif %} href="{{ '/staff/' | relative_url }}">Staff</a>
            </li>
            <li class="nav-item">
              <a {% if page.url == '/notes/' %}class="nav-link active" aria-current="page"{% else %}class="nav-link"{% endif %} href="{{ '/notes/' | relative_url }}">Notes</a>
            </li>
          </ul>
        </nav>
        <main class="col-md-9 col-lg-10 p-4">
          {{ content }}
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
